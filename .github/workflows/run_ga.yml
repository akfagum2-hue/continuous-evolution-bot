name: Continuous GA Search (Every 30 Minutes)

on:
  schedule:
    # This tells GitHub to run the script automatically every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows you to run it manually with a button click

jobs:
  run-search:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy

    - name: Restore Latest GA Checkpoint Array
      id: restore-sequence
      uses: actions/cache/restore@v4
      with:
        path: best_sequences.npy
        key: ga-matrix-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          ga-matrix-

    - name: Run GA Search Engine
      run: python main.py

    - name: Save Updated Results to GitHub Cache
      if: always() # Saves progress even if the 1200-second timer stops the script
      uses: actions/cache/save@v4
      with:
        path: best_sequences.npy
        key: ga-matrix-${{ github.run_id }}-${{ github.run_attempt }}
