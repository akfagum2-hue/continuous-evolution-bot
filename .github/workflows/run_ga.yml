name: Run Williamson GA

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Restore Cached Matrix
        uses: actions/cache@v4
        with:
          path: best_sequences.npy
          key: best-sequences-cache-${{ github.run_id }}-${{ github.run_number }}
          restore-keys: |
            best-sequences-cache-

      - name: Run Search Script
        run: python main.py

      - name: Save Updated Progress to Cache
        uses: actions/cache/save@v4
        with:
          path: best_sequences.npy
          key: best-sequences-cache-${{ github.run_id }}-${{ github.run_number }}

      - name: Commit Changes to Repo (Optional Backup)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated progress update [skip ci]"
          file_pattern: 'best_sequences.npy'
