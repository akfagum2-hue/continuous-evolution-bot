name: Continuous GA Search

on:
  schedule:
    - cron: '*/30 * * * *' # Automatically runs every 30 minutes
  workflow_dispatch: # Allows you to click a button in GitHub to start it manually

jobs:
  run-search:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Important: Gives the action permission to update files

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy

    - name: Run GA Search Engine
      run: python main.py

    - name: Save and Commit Updated Data
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated update: saved best_sequences.npy"
        file_pattern: 'best_sequences.npy'
